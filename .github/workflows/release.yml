name: Ryvn Build & Release
# Synced from ryvn monorepo via sync-ryvn-build-action workflow

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the service"
        required: true
        type: string
      runner:
        description: "Runner label as JSON array (e.g. '[\"ubuntu-latest\"]', '[\"self-hosted\", \"linux\"]')"
        required: false
        type: string
        default: '["ubuntu-latest"]'
      ryvn_api_url:
        description: "Ryvn API URL (for self-hosted or dev instances)"
        required: false
        type: string
        default: ""
      ryvn_auth_url:
        description: "Ryvn Auth URL (for self-hosted or dev instances)"
        required: false
        type: string
        default: ""
      ryvn_project_id:
        description: "Ryvn Project ID (for local dev setups)"
        required: false
        type: string
        default: ""
    secrets:
      RYVN_CLIENT_ID:
        required: true
      RYVN_CLIENT_SECRET:
        required: true
      BUILD_SECRETS:
        description: "Additional secrets for the build step (KEY=VALUE per line)"
        required: false

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      contents: write
      id-token: write

    env:
      HAS_BUILD_SECRETS: ${{ secrets.BUILD_SECRETS != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Ryvn CLI
        uses: ryvn-technologies/install-ryvn-cli@v1.0.0

      - name: Get Service Info
        id: service-info
        env:
          RYVN_CLIENT_ID: ${{ secrets.RYVN_CLIENT_ID }}
          RYVN_CLIENT_SECRET: ${{ secrets.RYVN_CLIENT_SECRET }}
          RYVN_API_URL: ${{ inputs.ryvn_api_url }}
          RYVN_AUTH_URL: ${{ inputs.ryvn_auth_url }}
          RYVN_PROJECT_ID: ${{ inputs.ryvn_project_id }}
        run: |
          service_json=$(ryvn get service ${{ inputs.service_name }} -o json)
          service_type=$(echo "$service_json" | jq -r '.definition.type')
          echo "service_type=$service_type" >> $GITHUB_OUTPUT

          # Derive tag prefix from service type
          if [ "$service_type" = "terraform.v1" ]; then
            tag_prefix=$(echo "$service_json" | jq -r '.definition.source.tagPrefix // ""')
          else
            tag_prefix="${{ inputs.service_name }}@"
          fi
          echo "tag_prefix=$tag_prefix" >> $GITHUB_OUTPUT

          # Determine if this service type requires a build step
          if [ "$service_type" = "web-server.v1" ] || [ "$service_type" = "job.v1" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          elif [ "$service_type" = "helm-chart.v1" ]; then
            # Helm charts require chartRepository to build and release
            chart_repo=$(echo "$service_json" | jq -r '.definition.chartRepository // ""')
            if [ -n "$chart_repo" ] && [ "$chart_repo" != "null" ]; then
              echo "needs_build=true" >> $GITHUB_OUTPUT
            else
              echo "::error::helm-chart.v1 service is missing required chartRepository configuration"
              exit 1
            fi
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Tag
        id: generate-tag
        env:
          RYVN_CLIENT_ID: ${{ secrets.RYVN_CLIENT_ID }}
          RYVN_CLIENT_SECRET: ${{ secrets.RYVN_CLIENT_SECRET }}
          RYVN_API_URL: ${{ inputs.ryvn_api_url }}
          RYVN_AUTH_URL: ${{ inputs.ryvn_auth_url }}
          RYVN_PROJECT_ID: ${{ inputs.ryvn_project_id }}
        run: |
          tag_info=$(ryvn generate-release-tag ${{ inputs.service_name }} --prefix=${{ steps.service-info.outputs.tag_prefix }} -o json --default-bump-minor)

          version=$(echo "$tag_info" | jq -r '.version')
          new_tag=$(echo "$tag_info" | jq -r '.tag')
          channel=$(echo "$tag_info" | jq -r '.channel')
          should_release=$(echo "$tag_info" | jq -r '.shouldRelease')

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "channel=$channel" >> $GITHUB_OUTPUT
          echo "should_release=$should_release" >> $GITHUB_OUTPUT

      - name: Set build environment
        if: env.HAS_BUILD_SECRETS == 'true' && steps.service-info.outputs.needs_build == 'true'
        run: echo "$BUILD_SECRETS" >> $GITHUB_ENV
        env:
          BUILD_SECRETS: ${{ secrets.BUILD_SECRETS }}

      - name: Build and Push
        if: steps.service-info.outputs.needs_build == 'true'
        uses: ryvn-technologies/ryvn-build-action@v2
        with:
          service_name: ${{ inputs.service_name }}
          version: ${{ steps.generate-tag.outputs.version }}
          build_only: ${{ steps.generate-tag.outputs.channel == '' }}
          ryvn_client_id: ${{ secrets.RYVN_CLIENT_ID }}
          ryvn_client_secret: ${{ secrets.RYVN_CLIENT_SECRET }}
          ryvn_api_url: ${{ inputs.ryvn_api_url }}
          ryvn_auth_url: ${{ inputs.ryvn_auth_url }}
          ryvn_project_id: ${{ inputs.ryvn_project_id }}
          build_secrets: ${{ secrets.BUILD_SECRETS }}

      - name: Create Ryvn Release
        if: |
          steps.generate-tag.outputs.channel != '' &&
          !contains(github.event.head_commit.message, '[skip-release]') &&
          !contains(github.event.pull_request.title, '[skip-release]')
        env:
          RYVN_CLIENT_ID: ${{ secrets.RYVN_CLIENT_ID }}
          RYVN_CLIENT_SECRET: ${{ secrets.RYVN_CLIENT_SECRET }}
          RYVN_API_URL: ${{ inputs.ryvn_api_url }}
          RYVN_AUTH_URL: ${{ inputs.ryvn_auth_url }}
          RYVN_PROJECT_ID: ${{ inputs.ryvn_project_id }}
        run: |
          version="${{ steps.generate-tag.outputs.new_tag }}"
          version=${version#${{ steps.service-info.outputs.tag_prefix }}}
          version=${version#@}
          channel="${{ steps.generate-tag.outputs.channel }}"

          ryvn create release ${{ inputs.service_name }} $version --channel "$channel"

      - name: Create GitHub Tag
        if: |
          steps.generate-tag.outputs.should_release == 'true' &&
          !contains(github.event.head_commit.message, '[skip-release]') &&
          !contains(github.event.pull_request.title, '[skip-release]')
        run: |
          new_tag="${{ steps.generate-tag.outputs.new_tag }}"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag $new_tag
          git push origin $new_tag

      - name: Create GitHub Release
        if: |
          steps.generate-tag.outputs.should_release == 'true' &&
          !contains(github.event.head_commit.message, '[skip-release]') &&
          !contains(github.event.pull_request.title, '[skip-release]')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.generate-tag.outputs.new_tag }}
          name: ${{ steps.generate-tag.outputs.new_tag }}
          generate_release_notes: false
          draft: false
          prerelease: false
